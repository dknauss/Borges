name: Node compatibility

on:
    workflow_dispatch:
    schedule:
        - cron: '23 9 * * *'

permissions:
    contents: read

jobs:
    node20:
        name: Node 20 compatibility
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Run unit tests
              run: npm test -- --runInBand --silent
